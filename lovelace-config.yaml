views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: custom:universal-remote-card
            platform: Fire TV
            remote_id: remote.fire_tv_192_168_1_17
            media_player_id: media_player.fire_tv_192_168_1_17
