              - - power
                - home
                - back
                - menu
              - - up
                - left
                - center
                - right
                - down
              - - volume_up
                - volume_down
                - volume_mute
              - - rewind
                - play_pause
                - fast_forward
              - - netflix
                - primevideo
                - youtube
                - disney
            custom_actions: []
        column_span: 1
