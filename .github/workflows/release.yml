name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Upload Release Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          if [ ! -f "dist/universal-remote-card.js" ]; then
            echo "ERROR: dist/universal-remote-card.js not found!"
            ls -la dist/ || echo "dist/ directory is empty or missing"
            exit 1
          fi
          echo "Build verified: $(du -sh dist/universal-remote-card.js)"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/universal-remote-card.js
            hacs.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
